name: publish

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is not on origin/main. Skipping publish."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            pkg-config \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish with Tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: YumeFrame v__VERSION__
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Linux (RPM) | [YumeFrame-__VERSION__-1.x86_64.rpm](https://github.com/${{ github.repository }}/releases/download/v__VERSION__/YumeFrame-__VERSION__-1.x86_64.rpm) |
            | Linux (AppImage) | [YumeFrame___VERSION___amd64.AppImage](https://github.com/${{ github.repository }}/releases/download/v__VERSION__/YumeFrame___VERSION___amd64.AppImage) |
            | Linux (DEB) | [YumeFrame___VERSION___amd64.deb](https://github.com/${{ github.repository }}/releases/download/v__VERSION__/YumeFrame___VERSION___amd64.deb) |
            | Windows (EXE) | [YumeFrame___VERSION___x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/v__VERSION__/YumeFrame___VERSION___x64-setup.exe) |
            | Windows (MSI) | [YumeFrame___VERSION___x64_en-US.msi](https://github.com/${{ github.repository }}/releases/download/v__VERSION__/YumeFrame___VERSION___x64_en-US.msi) |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: .
          tauriScript: bun tauri
